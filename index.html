<script>
const app = {
    // Database of Kicks
    products: [
        { id: 1, brand: 'Jordan', title: 'Air Jordan 1 High OG', price: 45000, badge: 'limited', image: 'https://images.unsplash.com/photo-1584735175315-9d5823860e14?auto=format&fit=crop&q=80&w=400' },
        { id: 2, brand: 'Nike', title: 'Dunk Low "Panda"', price: 28000, badge: 'new', image: 'https://images.unsplash.com/photo-1600054800747-be294a6a0d26?auto=format&fit=crop&q=80&w=400' },
        { id: 3, brand: 'Adidas', title: 'Yeezy Boost 350 V2', price: 55000, badge: 'authenticated', image: 'https://images.unsplash.com/photo-1586525198428-225f6f12cff5?auto=format&fit=crop&q=80&w=400' },
        { id: 4, brand: 'New Balance', title: '2002R Protection Pack', price: 32000, badge: 'sale', image: 'https://images.unsplash.com/photo-1539185441755-769473a23570?auto=format&fit=crop&q=80&w=400' },
        { id: 5, brand: 'Puma', title: 'MB.01 LaMelo Ball', price: 24500, badge: 'new', image: 'https://images.unsplash.com/photo-1608231387042-66d1773070a5?auto=format&fit=crop&q=80&w=400' }
    ],
    cart: [],

    init() {
        this.renderProducts(this.products);
        this.initCursor();
        this.initScrollProgress();
        this.setupEventListeners();
        console.log("KICKZ Engine: Fully Loaded");
    },

    // 1. PERFORMANCE MOUSE FOLLOWER
    initCursor() {
        const cursor = document.getElementById('cursor');
        window.addEventListener('mousemove', (e) => {
            // translate3d uses hardware acceleration for 60fps movement
            window.requestAnimationFrame(() => {
                cursor.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0)`;
            });
        });

        // Detect hovers on any interactive element
        document.addEventListener('mouseover', (e) => {
            if (e.target.closest('button, .filter-chip, .brand-logo, .card, a')) {
                cursor.classList.add('hovered');
            }
        });
        document.addEventListener('mouseout', (e) => {
            if (e.target.closest('button, .filter-chip, .brand-logo, .card, a')) {
                cursor.classList.remove('hovered');
            }
        });
    },

    // 2. PRODUCT GRID GENERATOR
    renderProducts(items) {
        const grid = document.getElementById('productGrid');
        if (items.length === 0) {
            grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 80px; opacity: 0.5;">No items found.</div>`;
            return;
        }
        grid.innerHTML = items.map(p => `
            <div class="card">
                <div class="badge badge-${p.badge}">${p.badge}</div>
                <div class="img-container">
                    <img src="${p.image}" alt="${p.title}" loading="lazy">
                    <button class="quick-view" onclick="app.openModal(${p.id})">QUICK VIEW</button>
                </div>
                <div style="text-align:left">
                    <small style="color:var(--primary); font-weight:700; text-transform:uppercase;">${p.brand}</small>
                    <h3 style="margin:5px 0; font-size:1.1rem;">${p.title}</h3>
                    <p class="text-gradient" style="font-weight:900; margin:0">Rs. ${p.price.toLocaleString()}</p>
                    <button class="btn-buy" style="margin-top:15px; padding: 12px;" onclick="app.addToCart(${p.id})">ADD TO CART</button>
                </div>
            </div>
        `).join('');
    },

    // 3. SEARCH & BRAND FILTERS
    handleSearch(query) {
        const filtered = this.products.filter(p => 
            p.title.toLowerCase().includes(query.toLowerCase()) || 
            p.brand.toLowerCase().includes(query.toLowerCase())
        );
        this.renderProducts(filtered);
    },

    filterByBrand(brand, element) {
        document.querySelectorAll('.filter-chip').forEach(chip => chip.classList.remove('active'));
        element.classList.add('active');
        
        const filtered = brand === 'All' ? this.products : this.products.filter(p => p.brand === brand);
        this.renderProducts(filtered);
    },

    // 4. UI COMPONENTS (Theme, Cart, Search Box)
    toggleTheme() {
        const body = document.body;
        const current = body.getAttribute('data-theme');
        body.setAttribute('data-theme', current === 'light' ? 'dark' : 'light');
    },

    toggleSearch() {
        const box = document.getElementById('searchBox');
        box.classList.toggle('active');
        if (box.classList.contains('active')) {
            document.getElementById('searchInput').focus();
        }
    },

    addToCart(id) {
        const item = this.products.find(p => p.id === id);
        this.cart.push(item);
        const count = document.getElementById('cartCount');
        count.innerText = this.cart.length;
        count.style.display = 'block';
        // Small animation effect
        count.style.transform = 'scale(1.5)';
        setTimeout(() => count.style.transform = 'scale(1)', 200);
    },

    // 5. MODAL SYSTEM
    openModal(id) {
        const p = this.products.find(x => x.id === id);
        document.getElementById('mTitle').innerText = p.title;
        document.getElementById('mBrand').innerText = p.brand;
        document.getElementById('mPrice').innerText = `Rs. ${p.price.toLocaleString()}`;
        document.getElementById('modalMainImg').src = p.image;
        document.getElementById('quickModal').classList.add('open');
    },

    closeModal() {
        document.getElementById('quickModal').classList.remove('open');
    },

    // 6. UTILITIES
    initScrollProgress() {
        const bar = document.getElementById('scrollProgress');
        window.addEventListener('scroll', () => {
            const pct = (window.scrollY / (document.documentElement.scrollHeight - window.innerHeight)) * 100;
            bar.style.width = pct + '%';
        });
    },

    setupEventListeners() {
        // Allow 'Esc' key to close modal
        window.addEventListener('keydown', (e) => { 
            if (e.key === 'Escape') this.closeModal(); 
        });
    }
};

// INITIALIZE ON LOAD
document.addEventListener('DOMContentLoaded', () => app.init());
</script>
